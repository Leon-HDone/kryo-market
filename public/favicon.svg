<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#0070ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#080810"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.5"/>
  <!-- Snowflake/Kryo icon -->
  <g transform="translate(32,32)" filter="url(#glow)">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-15.6" y1="-9" x2="15.6" y2="9" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-15.6" y1="9" x2="15.6" y2="-9" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <!-- Branches -->
    <line x1="0" y1="-18" x2="-5" y2="-12" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-18" x2="5" y2="-12" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="-5" y2="12" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="5" y2="12" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-15.6" y1="-9" x2="-10" y2="-12" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-15.6" y1="-9" x2="-12" y2="-3" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="15.6" y1="9" x2="10" y2="12" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="15.6" y1="9" x2="12" y2="3" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="url(#g)"/>
  </g>
</svg>